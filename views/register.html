<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo — Smart Parking</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .auth-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
      position: relative;
    }
    .auth-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 40% 50%, rgba(245,166,35,0.07) 0%, transparent 60%);
    }
    .auth-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl);
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .auth-logo {
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: var(--space-xl);
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); }
    @media(max-width:480px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-page="register">

  <div id="navbar-placeholder"></div>

  <main class="page-wrapper auth-bg">
    <div class="auth-card">
      <div class="auth-logo"><span class="text-accent">Smart</span> Parking</div>
      <h1 style="font-size:1.6rem;font-family:var(--font-display);margin-bottom:var(--space-xl)">Register</h1>

      <form id="register-form" novalidate>
        <div class="flex-col" style="gap:var(--space-md)">
          <div class="form-group">
            <label class="form-label" for="reg-name">Full Name</label>
            <input class="form-input" id="reg-name" type="text" placeholder="Thiago Luís Alberto da Luz" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input class="form-input" id="reg-email" type="email" placeholder="username@gmail.com" required>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label" for="reg-contact">Phone Number</label>
              <input class="form-input" id="reg-contact" type="tel" placeholder="912 345 678" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <input class="form-input" id="reg-password" type="password" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-confirm">Confirm Password</label>
            <input class="form-input" id="reg-confirm" type="password" required>
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%;margin-top:var(--space-sm)">Register</button>
        </div>
      </form>

      <div style="text-align:center;margin-top:var(--space-lg);font-size:0.875rem;color:var(--color-text-muted)">
        Have an account? <a href="login.html" style="color:var(--color-accent)">Sign In</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>

  
  <script src="../assets/js/View.js"></script>
  <script src ="../assets/js/register.js"></script>
</body>
</html>
