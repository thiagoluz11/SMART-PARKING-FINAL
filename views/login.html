<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Smart Parking</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .auth-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
      position: relative;
      overflow: hidden;
    }
    .auth-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(245,166,35,0.08) 0%, transparent 60%);
    }
    .auth-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl) var(--space-2xl);
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .auth-logo {
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: var(--space-xl);
    }
    .auth-title {
      font-size: 1.6rem;
      font-family: var(--font-display);
      margin-bottom: var(--space-xl);
    }
    .divider {
      display: flex; align-items: center; gap: var(--space-md);
      color: var(--color-text-faint);
      font-size: 0.8rem;
      margin: var(--space-lg) 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--color-border);
    }
    .social-btns {
      display: flex; gap: var(--space-sm);
    }
    .social-btn {
      flex: 1;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all var(--transition);
    }
    .social-btn:hover { background: var(--color-surface-3); border-color: var(--color-accent); }
    .social-btn img{
      width: auto;
      height: 24px ;
      object-fit: contain;
    }
    .form-footer {
      text-align: center;
      margin-top: var(--space-lg);
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }
    .pwd-wrapper { position: relative; }
    .pwd-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      background: none;
      border: none;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: color var(--transition);
    }
    .pwd-toggle:hover {
      color: var(--color-accent);
    }
  </style>
</head>
<body data-page="login">

  <div id="navbar-placeholder"></div>

  <main class="page-wrapper auth-bg">
    <div class="auth-card">
      <div class="auth-logo"><span class="text-accent">Smart</span> Parking</div>
      <h1 class="auth-title">Login</h1>

      <form id="login-form" novalidate>
        <div class="flex-col" style="gap:var(--space-md)">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input class="form-input" id="login-email" type="email" placeholder="username@gmail.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="pwd-wrapper">
              <input class="form-input" id="login-password" type="password" placeholder="Password" required>
              <button type="button" class="pwd-toggle" id="toggle-password"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 3 10 Q 12 20 21 10" /><path d="M 4 11 L 2 14" /><path d="M 7.5 13.5 L 5.5 17.5" /><path d="M 12 15 L 12 19.5" /><path d="M 16.5 13.5 L 18.5 17.5" /><path d="M 20 11 L 22 14" /></svg></button>
            </div>
            <a href="#" style="font-size:0.8rem;color:var(--color-accent);margin-top:2px">Forgot Password?</a>
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%;margin-top:var(--space-sm)">Sign in</button>
        </div>
      </form>

      <div class="form-footer">
        Don't have an account? <a href="register.html" style="color:var(--color-accent)">Register for free</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>

  
  <script src="../assets/js/View.js"></script>
  <script src="../assets/js/login.js"></script>
 
</body>
</html>
